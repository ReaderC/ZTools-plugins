<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机数据设置</title>
    <style>
      :root {
        color-scheme: light;
        --bg: oklch(0.965 0.004 255);
        --panel: oklch(0.99 0.002 255);
        --panel-strong: oklch(0.95 0.004 255);
        --text: oklch(0.29 0.01 255);
        --muted: oklch(0.54 0.008 255);
        --line: oklch(0.89 0.004 255);
        --line-strong: oklch(0.8 0.006 255);
        --accent: oklch(0.46 0.012 255);
        --accent-strong: oklch(0.22 0.01 255);
        --danger: oklch(0.58 0.12 22);
        --shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        --radius: 14px;
      }

      :root[data-theme='dark'] {
        color-scheme: dark;
        --bg: oklch(0.215 0.008 255);
        --panel: oklch(0.25 0.008 255);
        --panel-strong: oklch(0.29 0.008 255);
        --text: oklch(0.92 0.004 255);
        --muted: oklch(0.7 0.006 255);
        --line: oklch(0.34 0.008 255);
        --line-strong: oklch(0.42 0.008 255);
        --accent: oklch(0.76 0.01 255);
        --accent-strong: oklch(0.96 0.002 255);
        --danger: oklch(0.68 0.12 22);
        --shadow: none;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .shell {
        width: min(760px, calc(100vw - 20px));
        margin: 0 auto;
        padding: 10px 0 14px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
        padding: 0 2px;
      }

      .summary {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .summary h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        line-height: 1.2;
      }

      .summary span {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      .save-button {
        min-height: 32px;
        padding: 0 12px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .save-button.is-saving {
        border-color: var(--accent);
      }

      .list {
        display: grid;
        gap: 8px;
      }

      .item,
      .empty {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .item {
        padding: 10px 12px;
      }

      .item.is-disabled {
        opacity: 0.58;
      }

      .item.is-disabled .preview-button,
      .item.is-disabled .chip-input,
      .item.is-disabled .command-chip {
        opacity: 0.82;
      }

      .item-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-width: 0;
      }

      .item-row + .item-row,
      .preview-box {
        margin-top: 8px;
      }

      .item-title {
        min-width: 0;
        font-size: 14px;
        font-weight: 600;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .switch {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }

      .switch input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .switch-ui {
        position: relative;
        width: 36px;
        height: 20px;
        border-radius: 999px;
        background: var(--line-strong);
        transition: background 160ms ease;
      }

      .switch-ui::after {
        content: '';
        position: absolute;
        top: 2px;
        left: 2px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--panel);
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.12);
        transition: transform 160ms ease;
      }

      .switch input:checked + .switch-ui {
        background: var(--accent);
      }

      .switch input:checked + .switch-ui::after {
        transform: translateX(16px);
      }

      .switch-copy {
        font-size: 12px;
        color: var(--muted);
      }

      .conflict-bar {
        margin-bottom: 8px;
        padding: 8px 10px;
        border: 1px solid color-mix(in oklch, var(--danger) 28%, var(--line));
        border-radius: 10px;
        background: color-mix(in oklch, var(--danger) 6%, var(--panel));
        color: var(--danger);
        font-size: 12px;
        line-height: 1.5;
      }

      .command-area {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }

      .command-stack {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        min-width: 0;
        flex: 1;
      }

      .command-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 100%;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel-strong);
        font-size: 12px;
        line-height: 1;
      }

      .command-chip.is-conflict {
        border-color: color-mix(in oklch, var(--danger) 50%, var(--line));
        background: color-mix(in oklch, var(--danger) 8%, var(--panel));
      }

      .command-chip span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chip-remove {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        padding: 0;
        border: none;
        background: transparent;
        color: var(--muted);
        font: inherit;
        line-height: 1;
        cursor: pointer;
      }

      .chip-remove:hover {
        color: var(--danger);
      }

      .chip-input {
        width: 86px;
        min-width: 72px;
        height: 28px;
        padding: 0 10px;
        border: 1px dashed var(--line-strong);
        border-radius: 999px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 12px;
        outline: none;
      }

      .chip-input:focus {
        border-style: solid;
        border-color: var(--accent);
      }

      .preview-button {
        flex-shrink: 0;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: transparent;
        color: var(--text);
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }

      .preview-button:hover {
        border-color: var(--accent);
      }

      .preview-box {
        padding-top: 8px;
        border-top: 1px dashed var(--line);
      }

      .preview-box-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }

      .preview-copy {
        min-height: 24px;
        padding: 0 8px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 11px;
        cursor: pointer;
      }

      .preview-copy:hover {
        border-color: var(--line-strong);
        color: var(--text);
      }

      .preview-box pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
        font-size: 12px;
        line-height: 1.55;
        color: var(--muted);
      }

      .empty {
        padding: 18px;
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .shell {
          width: calc(100vw - 14px);
          padding-top: 8px;
        }

        .toolbar,
        .item-row,
        .command-area {
          align-items: flex-start;
        }

        .toolbar,
        .command-area {
          flex-direction: column;
        }

        .summary {
          flex-wrap: wrap;
        }

        .preview-button {
          align-self: flex-end;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="toolbar">
        <div class="summary">
          <h1>随机数据设置</h1>
          <span id="enabledCount">0 / 0 已开启</span>
        </div>
        <button id="saveButton" class="save-button" type="button" disabled>配置已保存</button>
      </header>
      <main id="list" class="list"></main>
    </div>
    <script>
      const api = window.randomDataApi
      const listElement = document.getElementById('list')
      const enabledCountElement = document.getElementById('enabledCount')
      const saveButton = document.getElementById('saveButton')
      const state = {
        items: [],
        previews: {},
        conflicts: {},
        saving: false,
        pendingSave: false
      }
      let autoSaveTimer = 0
      let focusState = null

      function applyTheme() {
        const dark = Boolean(window.ztools && typeof window.ztools.isDarkColors === 'function' && window.ztools.isDarkColors())
        document.documentElement.dataset.theme = dark ? 'dark' : 'light'
      }

      function updateHeight() {
        if (window.ztools && typeof window.ztools.setExpendHeight === 'function') {
          window.ztools.setExpendHeight(620)
        }
      }

      function showNotification(message) {
        if (window.ztools && typeof window.ztools.showNotification === 'function') {
          window.ztools.showNotification(message)
        }
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;')
      }

      function decorateItems(items) {
        return items.map(item => ({
          ...item,
          commands: Array.isArray(item.commands) ? item.commands.slice() : []
        }))
      }

      function findItem(code) {
        return state.items.find(item => item.code === code)
      }

      function renderSummary() {
        const enabledCount = state.items.filter(item => item.enabled).length
        enabledCountElement.textContent = `${enabledCount} / ${state.items.length} 已开启`
        saveButton.classList.toggle('is-saving', state.saving)
        saveButton.textContent = state.saving ? '保存中…' : state.pendingSave ? '等待保存…' : '已自动保存'
      }

      function rememberInputFocus(input) {
        if (!(input instanceof HTMLInputElement)) {
          focusState = null
          return
        }

        const row = input.closest('[data-code]')
        focusState = row ? {
          code: row.dataset.code || '',
          value: input.value,
          shouldRestore: true
        } : null
      }

      function restoreInputFocus() {
        if (!focusState) {
          return
        }

        const input = listElement.querySelector(
          `[data-code="${focusState.code}"] .chip-input[data-action="add-command"]`
        )

        if (!(input instanceof HTMLInputElement)) {
          focusState = null
          return
        }

        input.focus()
        input.value = focusState.value
        const length = input.value.length
        input.setSelectionRange(length, length)
        focusState.shouldRestore = false
      }

      function updateConflicts() {
        const commandMap = {}

        for (const item of state.items) {
          if (item.enabled === false) {
            continue
          }

          for (const command of item.commands) {
            const key = normalizeCommand(command)

            if (!key) {
              continue
            }

            if (!commandMap[key]) {
              commandMap[key] = []
            }

            commandMap[key].push(item.explain)
          }
        }

        const conflicts = {}

        for (const [command, names] of Object.entries(commandMap)) {
          if (names.length > 1) {
            conflicts[command] = names
          }
        }

        state.conflicts = conflicts
      }

      function renderCommands(item) {
        const chips = item.commands.map(command => `
          <div class="command-chip${state.conflicts[command] ? ' is-conflict' : ''}">
            <span>${escapeHtml(command)}</span>
            <button type="button" class="chip-remove" data-action="remove-command" data-command="${escapeHtml(command)}">×</button>
          </div>
        `)

        chips.push('<input class="chip-input" data-action="add-command" type="text" inputmode="text" autocomplete="off" placeholder="+ 指令">')
        return chips.join('')
      }

      function renderPreview(item) {
        if (Object.prototype.hasOwnProperty.call(state.previews, item.code) === false) {
          return ''
        }

        return `
          <div class="preview-box">
            <div class="preview-box-head">
              <span class="switch-copy">已生成</span>
              <button type="button" class="preview-copy" data-action="copy-preview">复制</button>
            </div>
            <pre>${escapeHtml(state.previews[item.code])}</pre>
          </div>
        `
      }

      async function copyPreviewText(text) {
        if (!text) {
          return
        }

        if (window.ztools && typeof window.ztools.copyText === 'function') {
          const result = window.ztools.copyText(text)

          if (result !== false) {
            showNotification('已复制')
            return
          }
        }

        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          await navigator.clipboard.writeText(text)
          showNotification('已复制')
        }
      }

      function renderList() {
        const activeElement = document.activeElement
        if (activeElement instanceof HTMLInputElement && activeElement.dataset.action === 'add-command') {
          rememberInputFocus(activeElement)
        } else if (focusState && focusState.shouldRestore !== true) {
          focusState = null
        }

        if (state.items.length === 0) {
          listElement.innerHTML = '<section class="empty">当前没有可配置项目。</section>'
          renderSummary()
          return
        }

        updateConflicts()
        const conflictEntries = Object.entries(state.conflicts)
        const conflictBar = conflictEntries.length > 0 ? `
          <section class="conflict-bar">
            以下指令存在冲突：${conflictEntries.map(([command, names]) => `${escapeHtml(command)}（${escapeHtml(names.join('、'))}）`).join('；')}
          </section>
        ` : ''

        listElement.innerHTML = `${conflictBar}${state.items.map((item, index) => `
          <section class="item${item.enabled ? '' : ' is-disabled'}" data-code="${escapeHtml(item.code)}" style="--index:${index}">
            <div class="item-row">
              <div class="item-title">${escapeHtml(item.explain)}</div>
              <label class="switch">
                <input type="checkbox" data-action="enabled" ${item.enabled ? 'checked' : ''}>
                <span class="switch-ui"></span>
                <span class="switch-copy">${item.enabled ? '开启' : '关闭'}</span>
              </label>
            </div>
            <div class="item-row command-area">
              <div class="command-stack">${renderCommands(item)}</div>
              <button type="button" class="preview-button" data-action="sample">生成数据</button>
            </div>
            ${renderPreview(item)}
          </section>
        `).join('')}`
        renderSummary()
        if (focusState && focusState.shouldRestore) {
          restoreInputFocus()
        }
      }

      function normalizeCommand(value) {
        return String(value || '').trim()
      }

      function scheduleAutoSave() {
        state.pendingSave = true
        renderSummary()

        if (autoSaveTimer) {
          clearTimeout(autoSaveTimer)
        }

        autoSaveTimer = window.setTimeout(() => {
          autoSaveTimer = 0
          handleSave()
        }, 220)
      }

      function addCommand(code, rawValue, input) {
        const item = findItem(code)

        if (!item) {
          return
        }

        const values = String(rawValue)
          .split(/[\n,，]/)
          .map(normalizeCommand)
          .filter(Boolean)

        if (values.length === 0) {
          if (input) {
            input.value = ''
          }
          return
        }

        let changed = false

        for (const value of values) {
          if (item.commands.includes(value) === false) {
            item.commands.push(value)
            changed = true
          }
        }

        if (input) {
          input.value = ''
        }

        if (changed) {
          renderList()
          scheduleAutoSave()
        }
      }

      function removeCommand(code, command) {
        const item = findItem(code)

        if (!item) {
          return
        }

        const nextCommands = item.commands.filter(value => value !== command)

        if (nextCommands.length === item.commands.length) {
          return
        }

        item.commands = nextCommands
        renderList()
        scheduleAutoSave()
      }

      async function handleSave() {
        if (!api) {
          return
        }

        if (state.saving) {
          state.pendingSave = true
          return
        }

        state.saving = true
        state.pendingSave = false
        renderSummary()

        try {
          const payload = state.items.map(item => ({
            code: item.code,
            enabled: item.enabled,
            commands: item.commands.slice()
          }))
          state.items = decorateItems(api.saveItems(payload))
          renderList()
        } catch (error) {
          showNotification(`保存失败：${error && error.message ? error.message : '未知错误'}`)
        } finally {
          state.saving = false
          renderSummary()

          if (state.pendingSave) {
            scheduleAutoSave()
          }
        }
      }

      listElement.addEventListener('change', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'enabled') {
          return
        }

        const row = target.closest('[data-code]')
        const item = row ? findItem(row.dataset.code) : null

        if (!item) {
          return
        }

        item.enabled = target.checked
        const copy = row.querySelector('.switch-copy')

        if (copy) {
          copy.textContent = target.checked ? '开启' : '关闭'
        }

        renderList()
        scheduleAutoSave()
      })

      listElement.addEventListener('keydown', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'add-command') {
          return
        }

        if (event.key === 'Enter' || event.key === ',' || event.key === '，') {
          event.preventDefault()
          const row = target.closest('[data-code]')
          const code = row ? row.dataset.code : ''

          if (code) {
            rememberInputFocus(target)
            addCommand(code, target.value, target)
          }
        }

        if (event.key === 'Backspace' && target.value === '') {
          const row = target.closest('[data-code]')
          const item = row ? findItem(row.dataset.code) : null

          if (item && item.commands.length > 0) {
            rememberInputFocus(target)
            item.commands.pop()
            renderList()
            scheduleAutoSave()
          }
        }
      })

      listElement.addEventListener('blur', event => {
        const target = event.target

        if (target instanceof HTMLInputElement === false || target.dataset.action !== 'add-command') {
          return
        }

        const relatedTarget = event.relatedTarget instanceof Element ? event.relatedTarget : null

        if (relatedTarget && relatedTarget.closest('[data-action="sample"], [data-action="remove-command"]')) {
          return
        }

        window.setTimeout(() => {
          const row = target.closest('[data-code]')
          const code = row ? row.dataset.code : ''

          if (code) {
            addCommand(code, target.value, target)
          }
        }, 0)
      }, true)

      listElement.addEventListener('click', event => {
        const target = event.target instanceof Element ? event.target : null

        if (!target) {
          return
        }

        const removeButton = target.closest('[data-action="remove-command"]')

        if (removeButton) {
          const row = removeButton.closest('[data-code]')
          const code = row ? row.dataset.code : ''
          const command = removeButton.getAttribute('data-command') || ''

          if (code && command) {
            removeCommand(code, command)
          }
          return
        }

        const previewButton = target.closest('[data-action="sample"]')

        const copyButton = target.closest('[data-action="copy-preview"]')

        if (copyButton) {
          const row = copyButton.closest('[data-code]')
          const code = row ? row.dataset.code : ''
          const text = code ? state.previews[code] : ''

          if (text) {
            copyPreviewText(text).catch((error) => {
              showNotification(`复制失败：${error && error.message ? error.message : '未知错误'}`)
            })
          }
          return
        }

        if (!previewButton) {
          return
        }

        const row = previewButton.closest('[data-code]')
        const code = row ? row.dataset.code : ''

        if (!code || !api) {
          return
        }

        state.previews[code] = api.generateSample(code)
        renderList()
      })

      function init() {
        applyTheme()
        updateHeight()

        if (!api) {
          listElement.innerHTML = '<section class="empty">当前环境不支持随机数据配置页面。</section>'
          return
        }

        state.items = decorateItems(api.getItems())
        renderList()
      }

      init()
    </script>
  </body>
</html>
