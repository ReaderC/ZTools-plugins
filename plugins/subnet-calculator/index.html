<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>子网掩码计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: var(--bg, #fff);
      color: var(--fg, #333);
      min-width: 420px;
    }
    .dark { --bg: #1e1e1e; --fg: #e0e0e0; --card: #2d2d2d; --border: #444; --input-bg: #3a3a3a; --accent: #5b9bd5; }
    .light { --bg: #fff; --fg: #333; --card: #f7f7f7; --border: #ddd; --input-bg: #fff; --accent: #0078d4; }
    h1 { font-size: 16px; margin-bottom: 12px; font-weight: 600; }
    .tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .tab {
      flex: 1; padding: 6px 0; text-align: center; border-radius: 4px; cursor: pointer;
      font-size: 13px; border: 1px solid var(--border); background: var(--card);
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .input-group { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
    label { font-size: 13px; min-width: 60px; }
    input {
      flex: 1; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 13px; background: var(--input-bg); color: var(--fg);
      outline: none; -webkit-box-shadow: 0 0 0 1000px var(--input-bg) inset; color-scheme: light dark;
    }
    input:focus { border-color: var(--accent); }
    input::selection { background: var(--accent); color: #fff; }
    button {
      padding: 6px 16px; background: var(--accent); color: #fff; border: none;
      border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { opacity: 0.9; }
    .mask-select {
      width: 90px; padding: 6px 4px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 13px; background: var(--input-bg); color: var(--fg); cursor: pointer;
    }
    .mask-select:focus { border-color: var(--accent); outline: none; }
    .results {
      background: var(--card); border-radius: 6px; padding: 12px;
      border: 1px solid var(--border);
    }
    .result-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0; font-size: 13px; border-bottom: 1px solid var(--border);
    }
    .result-row:last-child { border-bottom: none; }
    .result-label { color: #888; }
    .result-value { font-family: 'Consolas', 'Monaco', monospace; font-weight: 500; cursor: pointer; }
    .result-value:hover { color: var(--accent); }
    .error { color: #e74c3c; font-size: 13px; padding: 8px; text-align: center; }
    .hint { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
    .reverse-section { display: none; }
    .reverse-section.active { display: block; }
    .result-highlight { color: var(--accent); font-weight: 600; }
    .section-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
  </style>
</head>
<body>
  <h1>📐 子网掩码计算器</h1>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('calc', this)">子网计算</div>
    <div class="tab" onclick="switchTab('reverse', this)">子网逆算</div>
  </div>

  <!-- 子网计算 -->
  <div id="calcSection">
    <div class="input-group">
      <label>IP 地址</label>
      <input type="text" id="ipInput" placeholder="192.168.1.100" autocomplete="off" maxlength="15" inputmode="numeric" />
    </div>
    <div class="input-group">
      <label>掩码/CIDR</label>
      <input type="text" id="maskInput" placeholder="255.255.255.0 或 24" list="maskList" autocomplete="off" style="flex:1;" />
      <datalist id="maskList">
        <option value="/8"><option value="/16"><option value="/20"><option value="/21"><option value="/22"><option value="/23"><option value="/24"><option value="/25"><option value="/26"><option value="/27"><option value="/28"><option value="/29"><option value="/30">
      </datalist>
      <button onclick="calculate()">计算</button>
    </div>
  </div>

  <!-- 子网逆算 -->
  <div id="reverseSection" class="reverse-section">
    <div class="input-group">
      <label>主机数量</label>
      <input type="number" id="hostCountInput" placeholder="需要的主机数量，如 30" min="1" max="16777216" autocomplete="off" />
    </div>
    <div class="input-group">
      <label>起始 IP</label>
      <input type="text" id="startIpInput" placeholder="可选，指定起始IP" autocomplete="off" maxlength="15" inputmode="numeric" />
    </div>
    <button onclick="calculateReverse()" style="width:100%;">计算所需掩码</button>
  </div>

  <div id="resultArea"></div>
  <div class="hint">点击结果值可复制到剪贴板</div>

  <script>
    // 判断深色模式
    if (window.ztools && window.ztools.isDarkColors && window.ztools.isDarkColors()) {
      document.body.classList.add('dark');
    } else {
      document.body.classList.add('light');
    }



    function switchTab(tab, el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('calcSection').style.display = tab === 'calc' ? 'block' : 'none';
      document.getElementById('reverseSection').classList.toggle('active', tab === 'reverse');
      if (el) el.classList.add('active');
      document.getElementById('resultArea').innerHTML = '';
    }

    // 解析 IP 为 32 位整数
    function ipToInt(ip) {
      const parts = ip.trim().split('.').map(Number);
      if (parts.length !== 4 || parts.some(p => isNaN(p) || p < 0 || p > 255)) return null;
      return ((parts[0] << 24) | (parts[1] << 16) | (parts[2] << 8) | parts[3]) >>> 0;
    }

    // 32 位整数转 IP
    function intToIp(n) {
      return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
    }

    // 解析掩码
    function parseMask(mask) {
      mask = mask.trim().replace(/^\//, '');
      if (/^\d{1,2}$/.test(mask)) {
        const cidr = parseInt(mask);
        if (cidr < 0 || cidr > 32) return null;
        return cidr === 0 ? 0 : (~0 << (32 - cidr)) >>> 0;
      }
      return ipToInt(mask);
    }

    // 验证掩码合法性
    function isValidMask(maskInt) {
      const inv = (~maskInt) >>> 0;
      return (inv & (inv + 1)) === 0;
    }

    function maskToCidr(maskInt) {
      let count = 0;
      let n = maskInt;
      while (n) { count += n & 1; n >>>= 1; }
      return count;
    }

    // 整数安全幂运算
    function safePow(base, exp) {
      if (exp > 32) return Infinity;
      let result = 1;
      for (let i = 0; i < exp; i++) {
        result *= base;
        if (result > 1e18) return Infinity;
      }
      return result;
    }

    function calculate() {
      const ipVal = document.getElementById('ipInput').value;
      const maskVal = document.getElementById('maskInput').value;
      const area = document.getElementById('resultArea');

      const ipInt = ipToInt(ipVal);
      if (ipInt === null) { area.textContent = 'IP 地址格式错误'; return; }

      const maskInt = parseMask(maskVal);
      if (maskInt === null) { area.textContent = '子网掩码格式错误'; return; }

      if (!isValidMask(maskInt)) { area.textContent = '不是合法的子网掩码（连续1后接连续0）'; return; }

      const cidr = maskToCidr(maskInt);
      const network = (ipInt & maskInt) >>> 0;
      const wildcard = (~maskInt) >>> 0;
      const broadcast = (network | wildcard) >>> 0;
      const firstHost = cidr < 31 ? (network + 1) >>> 0 : network;
      const lastHost = cidr < 31 ? (broadcast - 1) >>> 0 : broadcast;
      const totalHosts = safePow(2, 32 - cidr);
      const usableHosts = cidr >= 31 ? (cidr === 32 ? 1 : 2) : totalHosts - 2;
      const ipClass = getIpClass(ipInt);
      const ipType = getIpType(ipInt);

      const rows = [
        ['网络地址', intToIp(network)],
        ['广播地址', intToIp(broadcast)],
        ['子网掩码', intToIp(maskInt)],
        ['通配符掩码', intToIp(wildcard)],
        ['CIDR', '/' + cidr],
        ['首个可用主机', intToIp(firstHost)],
        ['最后可用主机', intToIp(lastHost)],
        ['可用主机数', usableHosts.toLocaleString()],
        ['总地址数', totalHosts.toLocaleString()],
        ['IP 类别', ipClass],
        ['地址类型', ipType],
      ];

      renderResults(rows);
    }

    // 子网逆算：根据主机数反推掩码
    function calculateReverse() {
      const countInput = document.getElementById('hostCountInput').value;
      const startIpVal = document.getElementById('startIpInput').value;
      const area = document.getElementById('resultArea');

      const hostCount = parseInt(countInput);
      if (!hostCount || hostCount < 1 || hostCount > 16777216) {
        area.textContent = '请输入有效的主机数量（1-16777216）';
        return;
      }

      // 所需主机数 + 网络地址 + 广播地址
      const needed = hostCount + 2;
      // 反推最小 CIDR
      let cidr = 32;
      while (cidr > 0 && safePow(2, 32 - cidr) < needed) {
        cidr--;
      }
      if (cidr === 0) {
        area.textContent = '所需主机数超出范围';
        return;
      }

      const maskInt = cidr === 0 ? 0 : (~0 << (32 - cidr)) >>> 0;
      const hostNum = safePow(2, 32 - cidr);
      const usableHosts = cidr >= 31 ? (cidr === 32 ? 1 : 2) : hostNum - 2;

      const rows = [
        ['所需主机', hostCount.toLocaleString()],
        ['最小掩码', intToIp(maskInt)],
        ['CIDR', '/' + cidr, true],
        ['网段总容量', hostNum.toLocaleString()],
        ['可用主机数', usableHosts.toLocaleString()],
        ['推荐网段', intToIp((~maskInt) >>> 0) + ' (通配符)'],
      ];

      // 如果指定了起始IP，计算该网段
      if (startIpVal) {
        const startInt = ipToInt(startIpVal);
        if (startInt !== null) {
          const network = (startInt & maskInt) >>> 0;
          const broadcast = (network | (~maskInt) >>> 0) >>> 0;
          rows.push(['指定起始IP', startIpVal]);
          rows.push(['所在网段', intToIp(network) + '/' + cidr]);
          rows.push(['网段范围', intToIp(network + 1) + ' ~ ' + intToIp(broadcast - 1)]);
        }
      }

      renderResults(rows);
    }

    function renderResults(rows) {
      const area = document.getElementById('resultArea');
      area.innerHTML = '';
      const container = document.createElement('div');
      container.className = 'results';
      rows.forEach(([label, value, highlight]) => {
        const row = document.createElement('div');
        row.className = 'result-row';
        const labelSpan = document.createElement('span');
        labelSpan.className = 'result-label';
        labelSpan.textContent = label;
        const valSpan = document.createElement('span');
        valSpan.className = 'result-value' + (highlight ? ' result-highlight' : '');
        valSpan.textContent = value;
        valSpan.onclick = () => copyValue(value);
        row.appendChild(labelSpan);
        row.appendChild(valSpan);
        container.appendChild(row);
      });
      area.appendChild(container);
      if (window.ztools && window.ztools.setExpendHeight) {
        window.ztools.setExpendHeight(document.body.scrollHeight);
      }
    }

    function getIpClass(ipInt) {
      const first = (ipInt >>> 24) & 255;
      if (first < 128) return 'A';
      if (first < 192) return 'B';
      if (first < 224) return 'C';
      if (first < 240) return 'D (组播)';
      return 'E (保留)';
    }

    function getIpType(ipInt) {
      const a = (ipInt >>> 24) & 255, b = (ipInt >>> 16) & 255;
      if (a === 10) return '私有';
      if (a === 172 && b >= 16 && b <= 31) return '私有';
      if (a === 192 && b === 168) return '私有';
      if (a === 127) return '环回';
      if (a === 169 && b === 254) return '链路本地';
      return '公有';
    }

    function copyValue(text) {
      if (window.subnetApis && window.subnetApis.copyToClipboard) {
        window.subnetApis.copyToClipboard(text);
      } else {
        navigator.clipboard.writeText(text);
      }
      if (window.ztools && window.ztools.showNotification) {
        window.ztools.showNotification('\u5df2\u590d\u5236: ' + text);
      }
    }

    // 监听插件进入事件
    if (window.ztools && window.ztools.onPluginEnter) {
      window.ztools.onPluginEnter(function(param) {
        if (param.type === 'regex' && param.payload) {
          const parts = param.payload.split('/');
          if (parts.length === 2) {
            document.getElementById('ipInput').value = parts[0];
            document.getElementById('maskInput').value = '/' + parts[1];
            switchTab('calc');
            calculate();
          }
        } else if (param.type === 'text' && param.payload) {
          document.getElementById('ipInput').value = param.payload;
          document.getElementById('maskInput').focus();
        }
      });
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const calcVisible = document.getElementById('calcSection').style.display !== 'none';
        if (calcVisible) {
          calculate();
        } else {
          calculateReverse();
        }
      }
    });

    // IP输入框过滤并校验
    ['ipInput', 'startIpInput'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', function() {
          var val = this.value.replace(/[^0-9.]/g, '');
          var parts = val.split('.');
          if (parts.length > 4) parts = parts.slice(0, 4);
          parts = parts.map(function(p) {
            if (p === '') return '';
            var n = parseInt(p, 10);
            if (n > 255) return '255';
            return p;
          });
          this.value = parts.join('.');
        });
      }
    });

    // 初始化
    // 已使用 datalist 替代
  </script>
</body>
</html>
